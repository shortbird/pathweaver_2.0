services:
  # Daily Advisor Summary Cron Job
  - type: cron
    name: daily-advisor-summary
    runtime: python
    schedule: "0 12 * * *"  # 12 PM UTC = 7 AM EST / 8 AM EDT
    repo: https://github.com/shortbird/pathweaver_2.0.git
    branch: main
    rootDir: backend
    buildCommand: "pip install requests"
    startCommand: "python jobs/cron_trigger.py"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: BACKEND_URL
        value: https://api.optioeducation.com

  # Production Backend
  - type: web
    name: optio-prod-backend
    env: python
    branch: main
    rootDir: backend
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 300
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://www.optioeducation.com

  # Development Backend
  - type: web
    name: optio-dev-backend
    env: python
    branch: develop
    rootDir: backend
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 300
    envVars:
      - key: FLASK_ENV
        value: development
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://optio-dev-frontend.onrender.com

  # Production Frontend
  - type: static
    name: optio-prod-frontend
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_URL
        value: https://api.optioeducation.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  # Development Frontend
  - type: static
    name: optio-dev-frontend
    branch: develop
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_URL
        value: https://optio-dev-backend.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false