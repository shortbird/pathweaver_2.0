services:
  # Optio Cron — single consolidated cron service. Runs every 10 min and dispatches
  # the time-appropriate jobs (see backend/jobs/cron_dispatch.py):
  #   - SIS attendance sweep   -> every run (off-hours runs no-op server-side)
  #   - Daily advisor summary  -> once/day in the 12:00 UTC window (unchanged effect)
  # This replaces the previous separate daily-advisor-summary cron; the existing
  # dashboard cron service just needs its schedule + start command updated.
  - type: cron
    name: daily-advisor-summary
    runtime: python
    schedule: "*/10 * * * *"  # every 10 min; per-job timing handled in the dispatcher
    repo: https://github.com/shortbird/pathweaver_2.0.git
    branch: main
    rootDir: backend
    buildCommand: "pip install requests"
    startCommand: "python jobs/cron_dispatch.py"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: BACKEND_URL
        value: https://api.optioeducation.com

  # Production Backend
  # Reconciled 2026-06-22 to match the LIVE dashboard-managed service. The
  # previous values here had diverged and were NOT in effect (the live service
  # is dashboard-managed, not Blueprint-synced). Kept truthful so that if this
  # file is ever synced as a Blueprint it won't revert working config or drop
  # the health check / build filter.
  - type: web
    name: optio-prod-backend
    env: python
    branch: main
    # Live rootDir is the repo ROOT (empty): the build installs the ROOT
    # requirements.txt, and the app is started from backend/ in startCommand.
    rootDir: ""
    # ffmpeg/ffprobe are required by services/video_processing_service.py for
    # server-side video probe + thumbnail generation (installed via apt at build).
    # IMPORTANT: keep this in sync with the LIVE dashboard build command — this
    # service is dashboard-managed, so editing here alone does NOT change the build.
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app -c gunicorn.conf.py
    # Real DB-backed check (app.py:124, 200 healthy / 503 unhealthy) → enables
    # readiness-gated zero-downtime deploys, removing the deploy-cutover 502/504s.
    healthCheckPath: /api/health
    # Only redeploy the backend when something it depends on changes (most pushes
    # are frontend/mobile-only). Paths are repo-root relative.
    buildFilter:
      paths:
        - backend/**
        - requirements.txt
        - render.yaml
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://www.optioeducation.com

  # Development Backend
  # Reconciled 2026-06-22 to match the LIVE dashboard-managed service. Dev keeps
  # on-commit auto-deploy (fast iteration) and intentionally has NO health check
  # / build filter, matching the live dev service. ffmpeg installed for parity
  # with prod (keep in sync with the live dev dashboard build command).
  - type: web
    name: optio-dev-backend
    env: python
    branch: develop
    rootDir: ""
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app -c gunicorn.conf.py
    envVars:
      - key: FLASK_ENV
        value: development
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://optio-dev-frontend.onrender.com

  # Production Frontend
  - type: static
    name: optio-prod-frontend
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_URL
        value: https://api.optioeducation.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  # Development Frontend
  - type: static
    name: optio-dev-frontend
    branch: develop
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: VITE_API_URL
        value: https://optio-dev-backend.onrender.com
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false