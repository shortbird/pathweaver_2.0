[phases.setup]
nixPkgs = ["python39", "gcc"]

[phases.install]
cmds = [
    "cd backend && pip install -r requirements.txt"
]

[phases.build]
cmds = [
    "echo 'Build complete'"
]

[start]
cmd = "cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --log-level debug --access-logfile - --error-logfile -"