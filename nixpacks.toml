[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "cd backend && gunicorn app_wrapper:application --bind 0.0.0.0:${PORT:-8080} --workers 1 --worker-class sync --worker-connections 1000 --timeout 120 --keep-alive 5 --preload --log-level debug --access-logfile - --error-logfile - --capture-output"