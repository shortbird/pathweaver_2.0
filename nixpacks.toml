[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "gunicorn --chdir backend app_wrapper:application --bind 0.0.0.0:${PORT:-8080} --workers 1 --threads 2 --timeout 120 --keep-alive 5 --log-level info --access-logfile - --error-logfile -"