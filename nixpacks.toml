[phases.setup]
nixPkgs = ['nodejs_18', 'npm-9_x', 'python311', 'python311Packages.pip', 'python311Packages.virtualenv', 'gcc']

[phases.install]
cmds = [
    'npm install',
    'python -m venv /app/venv',
    'cd backend && /app/venv/bin/pip install -r ../requirements.txt'
]

[phases.build]
cmds = ['cd frontend && npm install && npm run build']

[start]
cmd = 'cd backend && /app/venv/bin/gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --log-level debug --access-logfile - --error-logfile -'