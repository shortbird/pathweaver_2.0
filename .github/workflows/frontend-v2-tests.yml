name: Frontend V2 Tests

on:
  push:
    branches: [develop]
    paths:
      - 'frontend-v2/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend-v2/**'

jobs:
  test:
    name: Jest Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        working-directory: frontend-v2
        # Retry up to 3 times — npm registry occasionally ECONNRESETs mid-install.
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for i in 1 2 3; do
            if npm ci; then exit 0; fi
            echo "npm ci attempt $i failed; retrying..."
            sleep 10
          done
          exit 1

      - name: Run tests
        working-directory: frontend-v2
        run: npm run test:run

      - name: Check pass rate
        working-directory: frontend-v2
        run: |
          TEST_OUTPUT=$(npm run test:run 2>&1 || true)
          echo "$TEST_OUTPUT"

          PASSED=$(echo "$TEST_OUTPUT" | grep -oP '\d+(?= passed)' | tail -1)
          FAILED=$(echo "$TEST_OUTPUT" | grep -oP '\d+(?= failed)' | tail -1 || echo "0")
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          TOTAL=$((PASSED + FAILED))

          if [ $TOTAL -eq 0 ]; then
            echo "Error: No test results found"
            exit 1
          fi

          PASS_RATE=$((PASSED * 100 / TOTAL))
          echo "Pass Rate: $PASS_RATE% ($PASSED/$TOTAL)"
          echo "Required: 95%"

          if [ $PASS_RATE -lt 95 ]; then
            echo "FAILED: Pass rate ($PASS_RATE%) below 95%"
            exit 1
          else
            echo "PASSED: Pass rate ($PASS_RATE%) meets 95%"
          fi

      - name: Coverage report
        if: github.event_name == 'pull_request'
        working-directory: frontend-v2
        run: npm run test:coverage || true

      - name: Test Results Summary
        if: always()
        run: |
          echo "## Frontend V2 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Required Pass Rate:** 95%" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
