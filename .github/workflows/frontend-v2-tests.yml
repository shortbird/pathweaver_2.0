name: Frontend V2 Tests

on:
  push:
    # main is included so Render's "Deploy after CI checks pass" gate sees a
    # status check on every merge commit. Paths filter intentionally
    # omitted on main to guarantee a check reports even when a merge only
    # touched backend/.
    branches: [develop, main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    # Required status check — no paths filter so the check always reports,
    # even on PRs that don't touch frontend-v2/ (ruleset blocks the merge
    # otherwise).
    branches: [main]

jobs:
  test:
    name: Jest Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        working-directory: frontend-v2
        # Retry up to 3 times — npm registry occasionally ECONNRESETs mid-install.
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for i in 1 2 3; do
            if npm ci; then exit 0; fi
            echo "npm ci attempt $i failed; retrying..."
            sleep 10
          done
          exit 1

      - name: npm audit (high/critical only)
        working-directory: frontend-v2
        # D2: supply-chain gate. Dev-only deps excluded; production surface only.
        run: npm audit --omit=dev --audit-level=high

      - name: TypeScript check (informational)
        working-directory: frontend-v2
        # Non-blocking today (pre-existing errors under `strict: true`).
        # Goal: drive count down, then switch this step to blocking.
        continue-on-error: true
        run: npm run typecheck

      - name: Run tests
        working-directory: frontend-v2
        # The gate IS the exit code: jest exits non-zero on any failure, which
        # fails this step and the job. The old "Check pass rate" step re-ran the
        # whole suite to compute a 95% threshold that could never matter — this
        # step already enforces 100%. Removed that second run (and the ungated
        # coverage run) to cut CI time.
        run: npm run test:run

      - name: Test Results Summary
        if: always()
        run: |
          echo "## Frontend V2 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Gate:** all tests must pass" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
