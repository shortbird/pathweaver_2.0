name: Frontend (v1) Tests

# A1: enforces the CLAUDE.md gate — 95%+ pass rate, 60%+ coverage before merge to main.
# Mirrors the frontend-v2-tests.yml pattern but adds an actual coverage threshold check.

on:
  push:
    # main is included so Render's "Deploy after CI checks pass" gate sees a
    # status check on every merge commit (not just PR heads). Paths filter
    # intentionally omitted on main to guarantee a check reports even when
    # a merge only touched backend/.
    branches: [develop, main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    # Required status check — no paths filter so the check always reports,
    # even on PRs that don't touch frontend/ (ruleset blocks the merge
    # otherwise with "X of Y required status checks are expected").
    branches: [main]

jobs:
  test:
    name: Vitest + coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        # Retry up to 3 times — npm registry occasionally ECONNRESETs mid-install.
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for i in 1 2 3; do
            if npm ci; then exit 0; fi
            echo "npm ci attempt $i failed; retrying..."
            sleep 10
          done
          exit 1

      - name: npm audit (high/critical only)
        working-directory: frontend
        # D2: supply-chain gate. Dev-only deps excluded; production surface only.
        run: npm audit --omit=dev --audit-level=high

      # On push (develop/main): just run the suite. The exit code is the gate —
      # vitest exits non-zero on any failure, failing the job. The old separate
      # "Check pass rate" step re-ran the whole suite to compute a 95% threshold
      # that could never matter (this run already enforces 100%), so it's gone.
      - name: Run tests
        if: github.event_name != 'pull_request'
        working-directory: frontend
        run: npm run test:run

      # On PR: a single coverage run is both the pass/fail gate (pipefail makes
      # a test failure fail the step) and the coverage gate. One run, not three.
      - name: Run tests + coverage gate
        if: github.event_name == 'pull_request'
        working-directory: frontend
        env:
          # Ratcheted 40 -> 44 on 2026-04-14 after adding unit tests for
          # utils/logger, utils/browserDetection, utils/nameUtils,
          # utils/pillarHelpers, utils/errorHandling (coverage 43.02 ->
          # 44.65 on that change). Ratchet upward only.
          MIN_COVERAGE: 44
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee /tmp/cov.log

          # Vitest text-summary "All files" row: "All files  |  60.61 |  ..."
          LINE_PCT=$(grep -E '^All files' /tmp/cov.log | awk -F'|' '{gsub(/ /, "", $2); print $2}' | head -1)
          LINE_INT=${LINE_PCT%.*}
          echo "Line coverage: ${LINE_PCT:-0}% (required: ${MIN_COVERAGE}%)"

          if [ "${LINE_INT:-0}" -lt "${MIN_COVERAGE}" ]; then
            echo "FAILED: line coverage (${LINE_PCT:-0}%) below ${MIN_COVERAGE}%"
            exit 1
          fi
          echo "PASSED: coverage gate met"

      - name: Test Results Summary
        if: always()
        run: |
          echo "## Frontend V1 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Gate:** all tests must pass" >> $GITHUB_STEP_SUMMARY
          echo "**Required Coverage (PR):** 44% lines (ratchet up over time, never down)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
