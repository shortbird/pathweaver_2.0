name: Release (main)

# Direct-to-main flow: push to main -> run all tests -> deploy + publish.
# (GitHub can't gate a *direct push* before it lands — checks run on the pushed
# commit — so the deploy/OTA gate is what enforces "only if tests pass".)
#
# Prod web + backend deploys are triggered EXPLICITLY by the `deploy` job the
# moment the backend + web tests pass — they don't wait for the mobile tests or
# the OTA publish. Render auto-deploy is OFF for both prod services: the old
# "Deploy after CI checks pass" setting waited for every check on the commit
# (including the OTA job) and sometimes never fired at all.
#
# develop keeps its own dev deploy (Render, on commit) + preview OTA
# (eas-update.yml); this workflow is main-only.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit
      - name: pip-audit (fail on high/critical CVEs)
        # DEP-H1 fix: audit the ROOT requirements.txt — that is the file Render
        # actually deploys (render.yaml rootDir: "" + pip install -r
        # requirements.txt). Previously this ran in backend/ and audited
        # backend/requirements.txt, so the enforcing gate was blind to prod.
        # Supply-chain gate (enforcing). Documented ignores re-reviewed per bump:
        # - PYSEC-2024-271 (flask-cors): log-injection only at LOG_LEVEL=debug;
        #   prod runs at WARNING. No upstream fix.
        # - PYSEC-2025-183 (pyjwt): disputed (CVE-2025-45768); our keys are 64-hex.
        # - PYSEC-2026-1845 (pytest): pytest is a TEST-only dependency (fix is a
        #   major 9.x bump); it is not part of the deployed runtime attack surface.
        run: |
          pip-audit --requirement requirements.txt \
            --strict \
            --vulnerability-service osv \
            --ignore-vuln PYSEC-2024-271 \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln PYSEC-2026-1845 \
            || { echo "::error::pip-audit found vulnerabilities"; exit 1; }
      - name: Run pytest
        working-directory: backend
        # NON-ENFORCING until a test DB exists (|| true). pip-audit above is the
        # real backend gate. Wire SUPABASE_TEST_* then drop `|| true`.
        env:
          FLASK_ENV: testing
          FLASK_SECRET_KEY: test-secret-key-for-ci-only
        run: python -m pytest tests/ --tb=short -v || true

  web:
    name: Web (v1) Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for i in 1 2 3; do
            if npm ci; then exit 0; fi
            echo "npm ci attempt $i failed; retrying..."; sleep 10
          done
          exit 1
      - name: npm audit (high/critical only)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
      - name: Run tests + coverage gate
        working-directory: frontend
        # Single run is both the pass/fail gate (pipefail) and the coverage gate.
        # Ratchet MIN_COVERAGE upward over time, never down.
        env:
          MIN_COVERAGE: 44
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee /tmp/cov.log
          LINE_PCT=$(grep -E '^All files' /tmp/cov.log | awk -F'|' '{gsub(/ /, "", $2); print $2}' | head -1)
          LINE_INT=${LINE_PCT%.*}
          echo "Line coverage: ${LINE_PCT:-0}% (required: ${MIN_COVERAGE}%)"
          if [ "${LINE_INT:-0}" -lt "${MIN_COVERAGE}" ]; then
            echo "FAILED: line coverage (${LINE_PCT:-0}%) below ${MIN_COVERAGE}%"; exit 1
          fi
          echo "PASSED: coverage gate met"

  mobile:
    name: Mobile (v2) Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json
      - name: Install dependencies
        working-directory: frontend-v2
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for i in 1 2 3; do
            if npm ci; then exit 0; fi
            echo "npm ci attempt $i failed; retrying..."; sleep 10
          done
          exit 1
      - name: npm audit (high/critical only)
        working-directory: frontend-v2
        run: npm audit --omit=dev --audit-level=high
      - name: TypeScript check (informational)
        working-directory: frontend-v2
        continue-on-error: true
        run: npm run typecheck
      - name: Run tests
        working-directory: frontend-v2
        run: npm run test:run

  # Prod web + backend — deploys fire as soon as THEIR tests pass, without
  # waiting for the mobile tests or the OTA publish. Pinned to this exact commit
  # so a racing push can't deploy something the tests didn't cover.
  deploy:
    name: Deploy prod (web + backend)
    needs: [backend, web]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Render deploys
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::RENDER_API_KEY secret is not set — prod deploys cannot be triggered."
            exit 1
          fi
          # backend, then web
          for svc in srv-d2to00vfte5s73ae9310 srv-d2to04vfte5s73ae97ag; do
            resp=$(curl -sS -X POST "https://api.render.com/v1/services/$svc/deploys" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"commitId\": \"$GITHUB_SHA\"}")
            id=$(echo "$resp" | jq -r '.id // empty')
            if [ -z "$id" ]; then
              echo "::error::Render deploy trigger failed for $svc: $resp"
              exit 1
            fi
            echo "$svc -> deploy $id"
          done

  # Post-deploy smoke check — probes the LIVE prod API after Render finishes
  # deploying this commit. CI-green tells you the code passed tests; this tells
  # you the code that actually went live serves the critical auth paths. Added
  # after 2026-07-21, when a CSRF-enforcement regression shipped green and
  # blocked login + iCreate registration for hours with zero alerts.
  # A failure here does NOT roll anything back — it is the alarm bell.
  smoke:
    name: Post-deploy smoke check (prod)
    needs: [deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Wait for this commit to be live
        run: |
          set -euo pipefail
          echo "Waiting for api.optioeducation.com to serve $GITHUB_SHA ..."
          for i in $(seq 1 60); do
            live=$(curl -sS --max-time 10 https://api.optioeducation.com/api/health | jq -r '.commit // empty' || true)
            if [ "$live" = "$GITHUB_SHA" ]; then
              echo "Live after ~$((i*20))s"; exit 0
            fi
            echo "  attempt $i: live commit = ${live:-unknown}"; sleep 20
          done
          echo "::error::Deploy never went live: prod still serves ${live:-unknown} after 20 min."
          exit 1
      - name: Probe critical auth paths
        run: |
          set -euo pipefail
          fail=0
          probe() { # name, expected-fragment-ABSENT, curl args...
            local name="$1"; shift
            local body status
            body=$(curl -sS --max-time 15 -w '\n%{http_code}' "$@")
            status=$(echo "$body" | tail -1); body=$(echo "$body" | sed '$d')
            echo "[$name] HTTP $status: $(echo "$body" | head -c 200)"
            if echo "$body" | grep -q 'csrf_required'; then
              echo "::error::[$name] returned a CSRF rejection — cookie-carrying users are blocked."
              fail=1
            fi
            if [ "$status" -ge 500 ]; then
              echo "::error::[$name] returned HTTP $status"
              fail=1
            fi
          }
          # Login must never CSRF-reject, even with stale auth cookies present.
          # Unique probe email per run so failed-attempt lockouts never accrue.
          probe "login+cookie" -X POST "https://api.optioeducation.com/api/auth/login" \
            -H "Content-Type: application/json" -H "Origin: https://www.optioeducation.com" \
            --cookie "access_token=smoke-stale" \
            -d "{\"email\":\"smoke-$GITHUB_RUN_ID@example.com\",\"password\":\"wrong\"}"
          # Refresh with a garbage cookie must fail as auth, not CSRF.
          probe "refresh+cookie" -X POST "https://api.optioeducation.com/api/auth/refresh" \
            -H "Content-Type: application/json" -H "Origin: https://www.optioeducation.com" \
            --cookie "refresh_token=smoke-stale" -d '{}'
          # CSRF token endpoint must serve tokens.
          csrf=$(curl -sS --max-time 15 "https://api.optioeducation.com/api/auth/csrf-token" \
            -H "Origin: https://www.optioeducation.com" | jq -r '.csrf_token // empty')
          if [ -z "$csrf" ]; then
            echo "::error::/api/auth/csrf-token returned no token"; fail=1
          else
            echo "[csrf-token] ok"
          fi
          # Web app must serve.
          web_status=$(curl -sS --max-time 15 -o /dev/null -w '%{http_code}' https://www.optioeducation.com/)
          echo "[web] HTTP $web_status"
          if [ "$web_status" -ge 400 ]; then
            echo "::error::www.optioeducation.com returned HTTP $web_status"; fail=1
          fi
          exit $fail

  # Production OTA — only after all three test jobs pass.
  ota:
    name: Publish production OTA
    needs: [backend, web, mobile]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        working-directory: frontend-v2
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for i in 1 2 3; do
            if npm ci; then exit 0; fi
            echo "npm ci attempt $i failed; retrying..."; sleep 10
          done
          exit 1
      # Materialize google-services.json so the OTA fingerprint matches the
      # Android *build* fingerprint. The file is gitignored (package-scoped keys),
      # so without it the Android runtimeVersion diverges and the published OTA
      # targets a runtime no installed build has — Android OTAs then silently never
      # arrive. iOS is unaffected (its fingerprint doesn't include this file). The
      # secret is base64 of frontend-v2/google-services.json; its CONTENT must match
      # the file EAS injects at build time (fingerprint hashes contents, not path).
      - name: Materialize google-services.json (Android OTA fingerprint parity)
        working-directory: frontend-v2
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 secret is not set — the Android OTA fingerprint will diverge from the build and the update will not reach Android devices."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > google-services.json
          echo "Wrote google-services.json ($(wc -c < google-services.json) bytes)"
      - name: Publish production OTA
        working-directory: frontend-v2
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG="${COMMIT_MSG%%$'\n'*}"
          export MSG
          # Run the export under the production EAS environment so `expo export`
          # inlines EXPO_PUBLIC_SUPABASE_URL / _ANON_KEY (stored as EAS env vars,
          # NOT in eas.json). Without this the OTA bundle ships an empty
          # supabaseUrl, so `createClient('')` throws "supabaseUrl is required" at
          # module load — the update launches, crashes, and expo-updates rolls
          # back to the embedded build (silent OTA loop; no emergency flag). The
          # build itself was fine because EAS Build injects these automatically.
          #
          # GUARD: fail loudly here if the required public env is empty, so a
          # crash-on-launch OTA can never be published again (the bug was silent —
          # it only surfaced via adb logcat). `${VAR:?msg}` aborts the shell when
          # VAR is unset/empty. Only vars without a safe runtime fallback are
          # guarded (API_URL falls back to prod in api.ts; Sentry DSN just no-ops).
          eas env:exec production --non-interactive '
            : "${EXPO_PUBLIC_SUPABASE_URL:?OTA env guard - EXPO_PUBLIC_SUPABASE_URL is empty, bundle would crash on launch, aborting publish}"
            : "${EXPO_PUBLIC_SUPABASE_ANON_KEY:?OTA env guard - EXPO_PUBLIC_SUPABASE_ANON_KEY is empty, aborting publish}"
            npm run ota:production -- -m "$MSG"
          '
