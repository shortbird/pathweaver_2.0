name: Frontend V2 E2E Tests

on:
  push:
    branches: [develop]
    paths:
      - 'frontend-v2/**'
      - 'backend/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - core
          - invitations
          - full-web
          - full-mobile

jobs:
  # ── Smoke tests on every push to develop ──
  smoke-tests:
    name: "Smoke Tests (Web)"
    runs-on: [self-hosted, macOS, maestro]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'smoke')
    timeout-minutes: 15
    env:
      E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
      E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
      E2E_PARENT_EMAIL: ${{ secrets.E2E_PARENT_EMAIL }}
      E2E_PARENT_PASSWORD: ${{ secrets.E2E_PARENT_PASSWORD }}
      E2E_OBSERVER_EMAIL: ${{ secrets.E2E_OBSERVER_EMAIL }}
      E2E_OBSERVER_PASSWORD: ${{ secrets.E2E_OBSERVER_PASSWORD }}
      E2E_ADVISOR_EMAIL: ${{ secrets.E2E_ADVISOR_EMAIL }}
      E2E_ADVISOR_PASSWORD: ${{ secrets.E2E_ADVISOR_PASSWORD }}
      E2E_ORGADMIN_EMAIL: ${{ secrets.E2E_ORGADMIN_EMAIL }}
      E2E_ORGADMIN_PASSWORD: ${{ secrets.E2E_ORGADMIN_PASSWORD }}
      E2E_SUPERADMIN_EMAIL: ${{ secrets.E2E_SUPERADMIN_EMAIL }}
      E2E_SUPERADMIN_PASSWORD: ${{ secrets.E2E_SUPERADMIN_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Kill stale servers
        shell: bash
        run: |
          lsof -ti:5001 | xargs kill -9 2>/dev/null || true
          lsof -ti:8081 | xargs kill -9 2>/dev/null || true

      - name: Install frontend dependencies
        shell: bash
        working-directory: frontend-v2
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npm install --legacy-peer-deps 2>&1 | tail -5

      - name: Install backend dependencies
        shell: bash
        run: |
          export PATH="/opt/homebrew/bin:$PATH"
          which python3.12 && python3.12 -m venv venv || python3 -m venv venv
          ./venv/bin/pip install -r backend/requirements.txt 2>&1 | tail -20
          echo "Python: $(./venv/bin/python --version)"
          echo "Flask: $(./venv/bin/python -c 'import flask; print(flask.__version__)' 2>&1)"
          echo "All imports: $(./venv/bin/python -c 'import flask, supabase, dotenv; print("OK")' 2>&1)"

      - name: Write frontend .env
        shell: bash
        working-directory: frontend-v2
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Start servers and run tests
        shell: bash
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          export PATH="$PATH:$HOME/.maestro/bin"

          # Start backend
          ./venv/bin/python backend/app.py > /tmp/optio-backend.log 2>&1 &
          BACKEND_PID=$!

          # Start frontend
          cd frontend-v2
          npx expo start --web --port 8081 > /tmp/optio-frontend.log 2>&1 &
          FRONTEND_PID=$!
          cd ..

          # Wait for backend
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            curl -s http://localhost:5001/api/health > /dev/null 2>&1 && break
            sleep 2
          done

          # Wait for frontend
          echo "Waiting for frontend..."
          for i in $(seq 1 40); do
            curl -s http://localhost:8081 > /dev/null 2>&1 && break
            sleep 2
          done

          # Extra wait for Expo to finish bundling
          sleep 10

          echo "=== Server status ==="
          curl -s http://localhost:5001/api/health 2>&1 | head -5 || echo "Backend not ready"
          curl -s http://localhost:8081 2>&1 | head -1 | cut -c1-100 || echo "Frontend not ready"
          echo ""

          # Run Maestro
          echo "Running Maestro smoke tests..."
          maestro test \
            frontend-v2/maestro/suites/smoke.yaml \
            --format junit \
            --output maestro-smoke-report.xml
          TEST_EXIT=$?

          # Cleanup
          kill $BACKEND_PID 2>/dev/null || true
          kill $FRONTEND_PID 2>/dev/null || true
          lsof -ti:5001 | xargs kill -9 2>/dev/null || true
          lsof -ti:8081 | xargs kill -9 2>/dev/null || true

          exit $TEST_EXIT
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FLASK_SECRET_KEY: ci-test-secret-key-not-for-production
          FLASK_ENV: testing

      - name: Dump logs on failure
        if: failure()
        shell: bash
        run: |
          echo "=== Backend log ==="
          tail -30 /tmp/optio-backend.log 2>/dev/null || echo "No log"
          echo ""
          echo "=== Frontend log ==="
          tail -30 /tmp/optio-frontend.log 2>/dev/null || echo "No log"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-smoke-report
          path: maestro-smoke-report.xml
          retention-days: 30

  # ── Full test suite on PR to main ──
  full-tests:
    name: "Full E2E (${{ github.event.inputs.suite || 'core' }})"
    runs-on: [self-hosted, macOS, maestro]
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.suite != 'smoke')
    timeout-minutes: 45
    env:
      E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
      E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
      E2E_PARENT_EMAIL: ${{ secrets.E2E_PARENT_EMAIL }}
      E2E_PARENT_PASSWORD: ${{ secrets.E2E_PARENT_PASSWORD }}
      E2E_OBSERVER_EMAIL: ${{ secrets.E2E_OBSERVER_EMAIL }}
      E2E_OBSERVER_PASSWORD: ${{ secrets.E2E_OBSERVER_PASSWORD }}
      E2E_ADVISOR_EMAIL: ${{ secrets.E2E_ADVISOR_EMAIL }}
      E2E_ADVISOR_PASSWORD: ${{ secrets.E2E_ADVISOR_PASSWORD }}
      E2E_ORGADMIN_EMAIL: ${{ secrets.E2E_ORGADMIN_EMAIL }}
      E2E_ORGADMIN_PASSWORD: ${{ secrets.E2E_ORGADMIN_PASSWORD }}
      E2E_SUPERADMIN_EMAIL: ${{ secrets.E2E_SUPERADMIN_EMAIL }}
      E2E_SUPERADMIN_PASSWORD: ${{ secrets.E2E_SUPERADMIN_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Kill stale servers
        shell: bash
        run: |
          lsof -ti:5001 | xargs kill -9 2>/dev/null || true
          lsof -ti:8081 | xargs kill -9 2>/dev/null || true

      - name: Install frontend dependencies
        shell: bash
        working-directory: frontend-v2
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npm install --legacy-peer-deps 2>&1 | tail -5

      - name: Install backend dependencies
        shell: bash
        run: |
          python3.12 -m venv venv 2>/dev/null || python3 -m venv venv
          ./venv/bin/pip install -r backend/requirements.txt -q 2>&1 | tail -3

      - name: Write frontend .env
        shell: bash
        working-directory: frontend-v2
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Determine suite
        id: suite
        shell: bash
        run: |
          SUITE="${{ github.event.inputs.suite || 'core' }}"
          echo "name=$SUITE" >> $GITHUB_OUTPUT

      - name: Start servers and run tests
        shell: bash
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          export PATH="$PATH:$HOME/.maestro/bin"

          ./venv/bin/python backend/app.py > /tmp/optio-backend.log 2>&1 &
          BACKEND_PID=$!

          cd frontend-v2
          npx expo start --web --port 8081 > /tmp/optio-frontend.log 2>&1 &
          FRONTEND_PID=$!
          cd ..

          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            curl -s http://localhost:5001/api/health > /dev/null 2>&1 && break
            sleep 2
          done

          echo "Waiting for frontend..."
          for i in $(seq 1 40); do
            curl -s http://localhost:8081 > /dev/null 2>&1 && break
            sleep 2
          done
          sleep 10

          SUITE="${{ steps.suite.outputs.name }}"
          SUITE_FILE="frontend-v2/maestro/suites/${SUITE}.yaml"

          if [ ! -f "$SUITE_FILE" ]; then
            echo "Suite not found: $SUITE_FILE"
            ls frontend-v2/maestro/suites/
            exit 1
          fi

          maestro test "$SUITE_FILE" --format junit --output "maestro-${SUITE}-report.xml"
          TEST_EXIT=$?

          kill $BACKEND_PID 2>/dev/null || true
          kill $FRONTEND_PID 2>/dev/null || true
          lsof -ti:5001 | xargs kill -9 2>/dev/null || true
          lsof -ti:8081 | xargs kill -9 2>/dev/null || true

          exit $TEST_EXIT
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FLASK_SECRET_KEY: ci-test-secret-key-not-for-production
          FLASK_ENV: testing

      - name: Dump logs on failure
        if: failure()
        shell: bash
        run: |
          echo "=== Backend log ==="
          tail -30 /tmp/optio-backend.log 2>/dev/null || echo "No log"
          echo ""
          echo "=== Frontend log ==="
          tail -30 /tmp/optio-frontend.log 2>/dev/null || echo "No log"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "maestro-${{ steps.suite.outputs.name }}-report"
          path: "maestro-*-report.xml"
          retention-days: 30
