name: Frontend V2 E2E Tests

on:
  push:
    branches: [develop]
    paths:
      - 'frontend-v2/**'
      - 'backend/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - core
          - invitations
          - full-web
          - full-mobile

jobs:
  # ── Smoke tests on every push to develop ──
  smoke-tests:
    name: "Smoke Tests (Web + iOS)"
    runs-on: [self-hosted, macOS, maestro]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.suite == 'smoke')
    timeout-minutes: 15
    env:
      E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
      E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
      E2E_PARENT_EMAIL: ${{ secrets.E2E_PARENT_EMAIL }}
      E2E_PARENT_PASSWORD: ${{ secrets.E2E_PARENT_PASSWORD }}
      E2E_OBSERVER_EMAIL: ${{ secrets.E2E_OBSERVER_EMAIL }}
      E2E_OBSERVER_PASSWORD: ${{ secrets.E2E_OBSERVER_PASSWORD }}
      E2E_ADVISOR_EMAIL: ${{ secrets.E2E_ADVISOR_EMAIL }}
      E2E_ADVISOR_PASSWORD: ${{ secrets.E2E_ADVISOR_PASSWORD }}
      E2E_ORGADMIN_EMAIL: ${{ secrets.E2E_ORGADMIN_EMAIL }}
      E2E_ORGADMIN_PASSWORD: ${{ secrets.E2E_ORGADMIN_PASSWORD }}
      E2E_SUPERADMIN_EMAIL: ${{ secrets.E2E_SUPERADMIN_EMAIL }}
      E2E_SUPERADMIN_PASSWORD: ${{ secrets.E2E_SUPERADMIN_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        shell: bash
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 22 || nvm install 22
          echo "Node: $(node --version)"

      - name: Install frontend dependencies
        shell: bash
        working-directory: frontend-v2
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npm ci --legacy-peer-deps

      - name: Install backend dependencies
        shell: bash
        run: |
          python3 -m venv venv 2>/dev/null || true
          source venv/bin/activate
          pip install -r backend/requirements.txt --quiet

      - name: Start backend
        shell: bash
        run: |
          source venv/bin/activate
          python backend/app.py > /tmp/optio-backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
          # Wait for backend
          for i in $(seq 1 30); do
            curl -s http://localhost:5001/api/health > /dev/null 2>&1 && break
            sleep 2
          done
          echo "Backend ready"

      - name: Start frontend web
        shell: bash
        working-directory: frontend-v2
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npx expo start --web --port 8081 --non-interactive > /tmp/optio-frontend.log 2>&1 &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV
          # Wait for frontend
          for i in $(seq 1 30); do
            curl -s http://localhost:8081 > /dev/null 2>&1 && break
            sleep 2
          done
          echo "Frontend ready"

      - name: Run Maestro smoke tests
        shell: bash
        run: |
          export PATH="$PATH:$HOME/.maestro/bin"
          maestro test \
            frontend-v2/maestro/suites/smoke.yaml \
            --format junit \
            --output maestro-smoke-report.xml

      - name: Dump server logs on failure
        if: failure()
        shell: bash
        run: |
          echo "=== Backend stdout ==="
          cat /tmp/optio-backend.log 2>/dev/null | tail -50 || echo "No backend log"
          echo ""
          echo "=== Frontend stdout ==="
          cat /tmp/optio-frontend.log 2>/dev/null | tail -50 || echo "No frontend log"
          echo ""
          echo "=== Curl backend health ==="
          curl -s http://localhost:5001/api/health 2>&1 || echo "Backend unreachable"
          echo ""
          echo "=== Curl frontend ==="
          curl -s http://localhost:8081 2>&1 | head -20 || echo "Frontend unreachable"
          echo ""
          echo "=== Maestro screenshots ==="
          ls -la ~/.maestro/tests/ 2>/dev/null || echo "No test artifacts"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-smoke-report
          path: maestro-smoke-report.xml
          retention-days: 30

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          kill ${{ env.BACKEND_PID }} 2>/dev/null || true
          kill ${{ env.FRONTEND_PID }} 2>/dev/null || true
          lsof -ti:5001 | xargs kill -9 2>/dev/null || true
          lsof -ti:8081 | xargs kill -9 2>/dev/null || true

  # ── Full test suite on PR to main ──
  full-tests:
    name: "Full E2E (${{ github.event.inputs.suite || 'core' }})"
    runs-on: [self-hosted, macOS, maestro]
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.suite != 'smoke')
    timeout-minutes: 45
    env:
      E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
      E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
      E2E_PARENT_EMAIL: ${{ secrets.E2E_PARENT_EMAIL }}
      E2E_PARENT_PASSWORD: ${{ secrets.E2E_PARENT_PASSWORD }}
      E2E_OBSERVER_EMAIL: ${{ secrets.E2E_OBSERVER_EMAIL }}
      E2E_OBSERVER_PASSWORD: ${{ secrets.E2E_OBSERVER_PASSWORD }}
      E2E_ADVISOR_EMAIL: ${{ secrets.E2E_ADVISOR_EMAIL }}
      E2E_ADVISOR_PASSWORD: ${{ secrets.E2E_ADVISOR_PASSWORD }}
      E2E_ORGADMIN_EMAIL: ${{ secrets.E2E_ORGADMIN_EMAIL }}
      E2E_ORGADMIN_PASSWORD: ${{ secrets.E2E_ORGADMIN_PASSWORD }}
      E2E_SUPERADMIN_EMAIL: ${{ secrets.E2E_SUPERADMIN_EMAIL }}
      E2E_SUPERADMIN_PASSWORD: ${{ secrets.E2E_SUPERADMIN_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        shell: bash
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 22 || nvm install 22

      - name: Install frontend dependencies
        shell: bash
        working-directory: frontend-v2
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npm ci --legacy-peer-deps

      - name: Install backend dependencies
        shell: bash
        run: |
          python3 -m venv venv 2>/dev/null || true
          source venv/bin/activate
          pip install -r backend/requirements.txt --quiet

      - name: Start backend
        shell: bash
        run: |
          source venv/bin/activate
          python backend/app.py > /tmp/optio-backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            curl -s http://localhost:5001/api/health > /dev/null 2>&1 && break
            sleep 2
          done

      - name: Start frontend web
        shell: bash
        working-directory: frontend-v2
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          npx expo start --web --port 8081 --non-interactive > /tmp/optio-frontend.log 2>&1 &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            curl -s http://localhost:8081 > /dev/null 2>&1 && break
            sleep 2
          done

      - name: Determine suite
        id: suite
        shell: bash
        run: |
          SUITE="${{ github.event.inputs.suite || 'core' }}"
          echo "name=$SUITE" >> $GITHUB_OUTPUT
          echo "Running suite: $SUITE"

      - name: Run Maestro E2E tests
        shell: bash
        run: |
          export PATH="$PATH:$HOME/.maestro/bin"
          SUITE="${{ steps.suite.outputs.name }}"
          SUITE_FILE="frontend-v2/maestro/suites/${SUITE}.yaml"

          if [ ! -f "$SUITE_FILE" ]; then
            echo "Suite file not found: $SUITE_FILE"
            echo "Available suites:"
            ls frontend-v2/maestro/suites/
            exit 1
          fi

          maestro test \
            "$SUITE_FILE" \
            --format junit \
            --output "maestro-${SUITE}-report.xml"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "maestro-${{ steps.suite.outputs.name }}-report"
          path: "maestro-*-report.xml"
          retention-days: 30

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          kill ${{ env.BACKEND_PID }} 2>/dev/null || true
          kill ${{ env.FRONTEND_PID }} 2>/dev/null || true
          lsof -ti:5001 | xargs kill -9 2>/dev/null || true
          lsof -ti:8081 | xargs kill -9 2>/dev/null || true
