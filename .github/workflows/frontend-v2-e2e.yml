name: Frontend V2 E2E Tests

on:
  push:
    branches: [develop]
    paths:
      - 'frontend-v2/**'
      - 'backend/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - auth
          - student
          - parent
          - all

jobs:
  e2e-tests:
    name: "E2E Tests (${{ github.event.inputs.suite || 'smoke' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
      E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
      E2E_PARENT_EMAIL: ${{ secrets.E2E_PARENT_EMAIL }}
      E2E_PARENT_PASSWORD: ${{ secrets.E2E_PARENT_PASSWORD }}
      E2E_OBSERVER_EMAIL: ${{ secrets.E2E_OBSERVER_EMAIL }}
      E2E_OBSERVER_PASSWORD: ${{ secrets.E2E_OBSERVER_PASSWORD }}
      E2E_ADVISOR_EMAIL: ${{ secrets.E2E_ADVISOR_EMAIL }}
      E2E_ADVISOR_PASSWORD: ${{ secrets.E2E_ADVISOR_PASSWORD }}
      E2E_ORGADMIN_EMAIL: ${{ secrets.E2E_ORGADMIN_EMAIL }}
      E2E_ORGADMIN_PASSWORD: ${{ secrets.E2E_ORGADMIN_PASSWORD }}
      E2E_SUPERADMIN_EMAIL: ${{ secrets.E2E_SUPERADMIN_EMAIL }}
      E2E_SUPERADMIN_PASSWORD: ${{ secrets.E2E_SUPERADMIN_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        working-directory: frontend-v2
        run: |
          npm install -D @playwright/test
          npx playwright install chromium

      - name: Wait for Render deploy
        run: |
          echo "Polling Render API for deploy completion..."
          # Poll v2 frontend service
          for i in $(seq 1 60); do
            DEPLOY_STATUS=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/srv-d76n4bdm5p6s73fac69g/deploys?limit=1" \
              2>/dev/null | jq -r '.[0].deploy.status // "unknown"')
            echo "  Attempt $i: frontend deploy status=$DEPLOY_STATUS"
            if [ "$DEPLOY_STATUS" = "live" ]; then
              echo "Frontend deploy is live!"
              break
            fi
            sleep 10
          done
          # Also check backend
          for i in $(seq 1 30); do
            BACKEND_STATUS=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/srv-d2tnvlvfte5s73ae8npg/deploys?limit=1" \
              2>/dev/null | jq -r '.[0].deploy.status // "unknown"')
            echo "  Backend deploy status=$BACKEND_STATUS"
            if [ "$BACKEND_STATUS" = "live" ]; then
              echo "Backend deploy is live!"
              break
            fi
            sleep 10
          done
          # Final health check
          echo "Frontend: $(curl -s -o /dev/null -w '%{http_code}' https://optio-dev-v2-frontend.onrender.com/)"
          echo "Backend: $(curl -s https://optio-dev-backend.onrender.com/api/health | head -1)"

      - name: Determine test files
        id: tests
        run: |
          SUITE="${{ github.event.inputs.suite || 'smoke' }}"
          case "$SUITE" in
            smoke)   echo "files=e2e/smoke.spec.ts" >> $GITHUB_OUTPUT ;;
            auth)    echo "files=e2e/auth.spec.ts" >> $GITHUB_OUTPUT ;;
            student) echo "files=e2e/student-*.spec.ts" >> $GITHUB_OUTPUT ;;
            parent)  echo "files=e2e/parent.spec.ts" >> $GITHUB_OUTPUT ;;
            all)     echo "files=e2e/" >> $GITHUB_OUTPUT ;;
            *)       echo "files=e2e/smoke.spec.ts" >> $GITHUB_OUTPUT ;;
          esac

      - name: Run E2E tests
        working-directory: frontend-v2
        run: npx playwright test ${{ steps.tests.outputs.files }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend-v2/playwright-report.xml
            frontend-v2/playwright-report/
            frontend-v2/test-results/
          retention-days: 30
