name: Frontend V2 E2E Tests

on:
  push:
    branches: [develop]
    paths:
      - 'frontend-v2/**'
      - 'backend/**'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke

jobs:
  e2e-tests:
    name: "E2E Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      E2E_STUDENT_EMAIL: ${{ secrets.E2E_STUDENT_EMAIL }}
      E2E_STUDENT_PASSWORD: ${{ secrets.E2E_STUDENT_PASSWORD }}
      E2E_PARENT_EMAIL: ${{ secrets.E2E_PARENT_EMAIL }}
      E2E_PARENT_PASSWORD: ${{ secrets.E2E_PARENT_PASSWORD }}
      E2E_OBSERVER_EMAIL: ${{ secrets.E2E_OBSERVER_EMAIL }}
      E2E_OBSERVER_PASSWORD: ${{ secrets.E2E_OBSERVER_PASSWORD }}
      E2E_ADVISOR_EMAIL: ${{ secrets.E2E_ADVISOR_EMAIL }}
      E2E_ADVISOR_PASSWORD: ${{ secrets.E2E_ADVISOR_PASSWORD }}
      E2E_ORGADMIN_EMAIL: ${{ secrets.E2E_ORGADMIN_EMAIL }}
      E2E_ORGADMIN_PASSWORD: ${{ secrets.E2E_ORGADMIN_PASSWORD }}
      E2E_SUPERADMIN_EMAIL: ${{ secrets.E2E_SUPERADMIN_EMAIL }}
      E2E_SUPERADMIN_PASSWORD: ${{ secrets.E2E_SUPERADMIN_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        working-directory: frontend-v2
        run: |
          npm install -D @playwright/test
          npx playwright install chromium

      - name: Wait for Render deploy
        run: |
          echo "Waiting for Render to deploy..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://optio-dev-v2-frontend.onrender.com/ 2>/dev/null)
            if [ "$STATUS" = "200" ]; then
              echo "Frontend ready (attempt $i)"
              break
            fi
            echo "  Attempt $i: status=$STATUS, waiting 10s..."
            sleep 10
          done

      - name: Run E2E tests
        working-directory: frontend-v2
        run: npx playwright test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend-v2/playwright-report.xml
            frontend-v2/playwright-report/
            frontend-v2/test-results/
          retention-days: 30
