name: EAS Update (OTA preview)

# Publishes a PREVIEW over-the-air JS bundle (develop -> `preview` channel) so
# internal testers get changes in minutes without a new native build.
#
# The PRODUCTION OTA lives in release.yml (push to main), gated on the test jobs
# so we never ship broken JS to real users. This workflow is develop-only.
#
# Only JS/asset changes ship this way. If a push changed native code, the
# fingerprint runtimeVersion won't match existing builds, so the update simply
# isn't delivered to them (that's the safety guarantee of the `fingerprint`
# policy) — those changes still need `eas build`.
#
# Required repo secrets:
#   EXPO_TOKEN          - Expo robot access token (Expo dashboard > Access tokens)
#   SENTRY_ORG          - optio-llc
#   SENTRY_PROJECT      - node   (or the numeric project id)
#   SENTRY_AUTH_TOKEN   - Sentry auth token with project:releases scope

on:
  push:
    branches: [develop]
    paths:
      - 'frontend-v2/**'
      - '.github/workflows/eas-update.yml'

# One publish per branch at a time; newer pushes supersede in-flight ones.
concurrency:
  group: eas-update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish OTA update
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: frontend-v2
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for i in 1 2 3; do
            if npm ci; then exit 0; fi
            echo "npm ci attempt $i failed; retrying..."
            sleep 10
          done
          exit 1

      - name: Publish preview OTA
        working-directory: frontend-v2
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # Read the commit message via env, never interpolate it into the shell
          # (avoids script injection from untrusted commit messages).
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG="${COMMIT_MSG%%$'\n'*}"   # first line only
          npm run ota:preview -- -m "$MSG"
