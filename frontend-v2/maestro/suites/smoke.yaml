# Smoke Suite - Run on every push to develop (~3 min)
# Tests the critical happy paths that must never break.
#
# S1: Student login
# S2: Dashboard loads with stats
# S3: Parent login + family tab
# S4: Org login via slug
#
# These reference existing flows in flows/
# Add more as flows are built out.

executionOrder:
  continueOnFailure: true
  flows:
    # S1 + S2: Student login -> dashboard loads
    - ../flows/auth/login-as-student.yaml
    - ../flows/dashboard/full-dashboard-smoke.yaml

    # S3: Parent login -> family view
    - ../flows/auth/login-as-parent.yaml

    # S4: Auth flows
    - ../flows/auth/login.yaml
