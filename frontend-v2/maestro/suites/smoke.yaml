url: https://optio-dev-v2-frontend.onrender.com
name: "Smoke Suite - Web"
tags:
  - smoke
  - ci
  - web
---
- launchApp
- takeScreenshot: /tmp/maestro-debug-1

- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 30000
- takeScreenshot: /tmp/maestro-debug-2

# S1: Student login -> verify dashboard
- tapOn: "you@email.com"
- inputText: ${E2E_STUDENT_EMAIL}
- tapOn: "Enter password"
- inputText: ${E2E_STUDENT_PASSWORD}
- tapOn: "Sign In"
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 20000
- takeScreenshot: /tmp/maestro-debug-3
- assertVisible: "Total XP"
- assertVisible: "Active Quests"
