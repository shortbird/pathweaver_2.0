appId: com.optioeducation.optio
name: "Smoke Suite"
tags:
  - smoke
  - ci
---
# Smoke Suite - Run on every push to develop (~3 min)
# Tests the critical happy paths that must never break.

# S1 + S2: Student login -> dashboard loads
- runFlow: ../flows/auth/login-as-student.yaml
- runFlow: ../flows/dashboard/full-dashboard-smoke.yaml

# S3: Parent login -> family view
- runFlow: ../flows/auth/login-as-parent.yaml

# S4: Auth flows
- runFlow: ../flows/auth/login.yaml
